name: e2e

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm test
        env:
          # The LLM healing tier stays OFF in CI.
          # SELF_HEAL_LLM=true and adding an ANTHROPIC_API_KEY repo secret.
          SELF_HEAL_LLM: ${{ vars.SELF_HEAL_LLM || 'false' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload self-heal report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: heal-report
          path: .self-heal/
          retention-days: 14
          if-no-files-found: ignore